name: Build and deploy docs

on:
  push:
    branches: [master]
    paths:
      - 'sphinx/**'
      - 'src/**'
      - 'docs/**'
      - '*.md'
      - 'Doxyfile'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sphinx/requirements.txt

      - name: Install Doxygen
        run: sudo apt-get install -y doxygen

      - name: Install Python dependencies
        run: pip install -r sphinx/requirements.txt

      - name: Run Doxygen
        run: mkdir -p sphinx/_build/doxygen && doxygen Doxyfile

      - name: Build HTML
        run: sphinx-build -b html sphinx/source sphinx/build/html
        env:
          SPHINXOPTS: --keep-going

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sphinx/build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
